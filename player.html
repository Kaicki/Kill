<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">
  <iframe id="frame" allowfullscreen></iframe>
</div>

<script>
const id = localStorage.getItem("videoId");

if(id){
  document.getElementById("frame").src =
    `https://drive.google.com/file/d/${id}/preview`;
}else{
  document.body.innerHTML = "<h1>Erro ao carregar vídeo</h1>";
}
</script>

</body>
</html>
